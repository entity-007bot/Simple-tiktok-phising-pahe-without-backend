<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok Survey</title>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000, #25F4EE, #FE2C55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 10px;
    }
    .container {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      text-align: center;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1em;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #FE2C55;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }
    #debug {
      margin-top: 10px;
      font-size: 0.85em;
      color: red;
      text-align: left;
      max-height: 120px;
      overflow-y: auto;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>TikTok Survey</h2>
  <form id="survey-form">
    <input type="text" name="user_contact" placeholder="Email or Phone Number" required>
    <textarea name="user_feedback" placeholder="How do you enjoy TikTok?" required></textarea>
    <button type="submit">Submit</button>
  </form>
  <div id="debug"></div>
</div>

<script>
  // Initialize EmailJS with your public key
  emailjs.init("YOUR_PUBLIC_KEY");

  const form = document.getElementById("survey-form");
  const debugArea = document.getElementById("debug");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    debugArea.innerHTML = "Sending…";

    emailjs.sendForm(
      "YOUR_SERVICE_ID",
      "YOUR_TEMPLATE_ID",
      this
    ).then(function(response) {
      debugArea.innerHTML = "✅ Sent successfully!";
      form.reset();
    }, function(error) {
      debugArea.innerHTML = "❌ Error sending form: " + JSON.stringify(error);
    });
  });
</script>

</body>
</html>
