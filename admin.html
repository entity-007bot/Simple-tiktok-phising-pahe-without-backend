<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container {
  padding:20px;
}

.stats {
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  flex:1;
  text-align:center;
}

.data-card {
  background:#1e293b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h2>Admin Dashboard</h2>
  <a href="/logout" style="color:red;">Logout</a>
</header>

<div class="container">

<div class="stats">
  <div class="card">
    <h3 id="total">0</h3>
    <p>Total Submissions</p>
  </div>
</div>

<div id="list"></div>

</div>

<script>
async function load(){
  try{
    const res = await fetch("/data");
    const data = await res.json();

    document.getElementById("total").innerText = data.length;

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.reverse().forEach(item=>{
      const div = document.createElement("div");
      div.className = "data-card";

      div.innerHTML = `
        <b>${item.contact}</b><br>
        ${item.feedback}<br><br>
        <small>${item.time}</small>
      `;

      list.appendChild(div);
    });

  } catch {
    window.location.href = "/login.html";
  }
}

// realtime feel
setInterval(load, 3000);
load();
</script>

</body>
</html>
