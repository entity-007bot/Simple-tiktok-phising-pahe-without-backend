<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:#1e293b;
  padding:30px;
  border-radius:10px;
  width:300px;
}
input, button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}
button {
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h2 style="color:white;">Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="msg" style="color:red;"></p>
</div>

<script>
async function login(){
  const res = await fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  });

  const data = await res.json();

  if(data.success){
    window.location.href = "/admin.html";
  } else {
    msg.innerText = "Invalid login";
  }
}
</script>

</body>
</html>
